<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FinanceFlow</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-950 text-white font-sans antialiased">

  <nav class="border-b border-gray-800 px-6 py-4 flex items-center justify-between">
    <div class="flex items-center gap-2">
      <div class="w-7 h-7 rounded-md bg-emerald-500 flex items-center justify-center text-sm font-bold text-black">F</div>
      <span class="font-semibold text-lg">FinanceFlow</span>
    </div>
    <div class="hidden md:flex items-center gap-8 text-sm text-gray-400">
      <a href="#" class="hover:text-white transition">Dashboard</a>
      <a href="#" class="text-white font-medium border-b border-emerald-400 pb-0.5">Portfolio</a>
      <a href="#" class="hover:text-white transition">Markets</a>
      <a href="#" class="hover:text-white transition">Reports</a>
    </div>
    <div id="nav-avatar" class="w-8 h-8 rounded-full flex items-center justify-center text-sm font-bold"></div>
  </nav>

  <main class="max-w-5xl mx-auto px-6 py-10 space-y-8">
    <div id="profile-header"></div>
    <div id="summary-cards" class="grid grid-cols-2 md:grid-cols-4 gap-4"></div>
    <div id="portfolio-section" class="bg-gray-900 border border-gray-800 rounded-2xl p-6"></div>
    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
      <div id="activity-section"></div>
      <div id="right-column" class="space-y-4"></div>
    </div>
  </main>

  <footer class="border-t border-gray-800 px-6 py-8 mt-4 text-center text-sm text-gray-600">
    &copy; 2026 FinanceFlow. Built for Nexus Vibe Day.
  </footer>

<script>
// ─── Mock Data ────────────────────────────────────────────────────────────────

const user = {
  name: "Marcus Rivera",
  initials: "MR",
  email: "marcus.rivera@email.com",
  location: "New York, NY",
  memberSince: "Mar 2019",
  plan: "Gold Member",
  riskProfile: "Growth-Oriented",
  avatarColor: "bg-violet-600",
};

const summary = [
  { label: "Portfolio Value", value: "$248,430", change: "+18.6% YTD",    positive: true  },
  { label: "Today's Gain",    value: "+$1,240",  change: "+0.50% today",  positive: true  },
  { label: "Total Return",    value: "$46,180",  change: "All time",      positive: true  },
  { label: "Dividends (YTD)", value: "$3,820",   change: "+11.2% vs last yr", positive: true },
];

const portfolio = [
  { name: "S&P 500",    ticker: "VOO", desc: "US Large Cap Index", value: "$99,372",  pct: 40, change: "+22.1%", positive: true,  color: "#10b981" },
  { name: "Nasdaq 100", ticker: "QQQ", desc: "US Tech Index",      value: "$49,686",  pct: 20, change: "+31.4%", positive: true,  color: "#3b82f6" },
  { name: "Gold ETF",   ticker: "GLD", desc: "Commodity / Hedge",  value: "$44,717",  pct: 18, change: "+8.7%",  positive: true,  color: "#f59e0b" },
  { name: "US Bonds",   ticker: "AGG", desc: "Fixed Income",       value: "$29,812",  pct: 12, change: "-1.2%",  positive: false, color: "#8b5cf6" },
  { name: "Cash",       ticker: "HYSA", desc: "4.85% APY",         value: "$24,843",  pct: 10, change: "+4.85%", positive: true,  color: "#4b5563" },
];

const activity = [
  { icon: "📈", bg: "bg-emerald-900 text-emerald-300", label: "Bought VOO",     sub: "Mar 22, 2026 · 5 shares",        amount: "-$2,415.00", positive: false },
  { icon: "🏛",  bg: "bg-amber-900 text-amber-300",    label: "Bought GLD",     sub: "Mar 20, 2026 · 8 shares",        amount: "-$1,876.00", positive: false },
  { icon: "💰", bg: "bg-blue-900 text-blue-300",       label: "Dividend — QQQ", sub: "Mar 18, 2026 · Quarterly",       amount: "+$318.40",   positive: true  },
  { icon: "💼", bg: "bg-violet-900 text-violet-300",   label: "Sold AGG",       sub: "Mar 15, 2026 · 20 shares",       amount: "+$2,040.00", positive: true  },
  { icon: "🏠", bg: "bg-gray-800 text-gray-300",       label: "Cash Deposit",   sub: "Mar 1, 2026 · Auto transfer",    amount: "+$3,000.00", positive: true  },
];

const accounts = [
  { icon: "📊", bg: "bg-blue-900 text-blue-300",   name: "Fidelity Brokerage", sub: "Individual · ••••  7720", value: "$223,587" },
  { icon: "🎯", bg: "bg-violet-900 text-violet-300", name: "Roth IRA",          sub: "Retirement · ••••  3341", value: "$24,843"  },
];

const performance = [
  { label: "1 Month",  value: "+3.2%"  },
  { label: "3 Months", value: "+7.8%"  },
  { label: "1 Year",   value: "+18.6%" },
  { label: "All Time", value: "+22.8%" },
];

// ─── Render Helpers ────────────────────────────────────────────────────────────

function $(id) { return document.getElementById(id); }

function renderProfile() {
  $("nav-avatar").className = `w-8 h-8 rounded-full ${user.avatarColor} flex items-center justify-center text-sm font-bold`;
  $("nav-avatar").textContent = user.initials;

  $("profile-header").innerHTML = `
    <div class="bg-gray-900 border border-gray-800 rounded-2xl p-6 flex flex-col sm:flex-row items-start sm:items-center gap-5">
      <div class="w-16 h-16 rounded-full bg-gradient-to-br from-violet-500 to-indigo-700 flex items-center justify-center text-2xl font-bold shrink-0">
        ${user.initials}
      </div>
      <div class="flex-1">
        <div class="flex flex-wrap items-center gap-3 mb-1">
          <h1 class="text-xl font-bold">${user.name}</h1>
          <span class="text-xs bg-violet-900 text-violet-300 px-2.5 py-0.5 rounded-full font-medium">✓ Verified</span>
          <span class="text-xs bg-yellow-900 text-yellow-300 px-2.5 py-0.5 rounded-full font-medium">⭐ ${user.plan}</span>
        </div>
        <p class="text-gray-400 text-sm">${user.email} &nbsp;·&nbsp; ${user.location} &nbsp;·&nbsp; Member since ${user.memberSince}</p>
      </div>
      <div class="text-right shrink-0">
        <p class="text-xs text-gray-500 mb-0.5">Risk Profile</p>
        <p class="text-sm font-semibold text-yellow-400">${user.riskProfile}</p>
      </div>
    </div>`;
}

function renderSummary() {
  $("summary-cards").innerHTML = summary.map(s => `
    <div class="bg-gray-900 border border-gray-800 rounded-2xl p-5">
      <p class="text-xs text-gray-500 mb-1">${s.label}</p>
      <p class="text-2xl font-bold ${s.label === "Today's Gain" ? "text-emerald-400" : ""}">${s.value}</p>
      <p class="text-xs mt-1 ${s.positive ? "text-emerald-400" : "text-red-400"}">${s.change}</p>
    </div>`).join("");
}

function renderDonutChart() {
  // r=70, circumference=439.82, gap=5px between segments
  const R = 70, C = 2 * Math.PI * R;
  let offset = 0;
  const segments = portfolio.map(h => {
    const arc = (h.pct / 100) * C;
    const dash = arc - 5;
    const seg = { color: h.color, dash, gap: C, offset };
    offset += arc;
    return seg;
  });

  const circles = segments.map(s => `
    <circle cx="100" cy="100" r="${R}" fill="none" stroke="${s.color}" stroke-width="30"
      stroke-dasharray="${s.dash.toFixed(2)} ${s.gap.toFixed(2)}"
      stroke-dashoffset="${(-s.offset).toFixed(2)}"/>`).join("");

  return `
    <svg viewBox="0 0 200 200" class="w-full h-full -rotate-90">
      <circle cx="100" cy="100" r="${R}" fill="none" stroke="#1f2937" stroke-width="30"/>
      ${circles}
    </svg>`;
}

function renderPortfolio() {
  const holdings = portfolio.map(h => `
    <div class="flex items-center justify-between">
      <div class="flex items-center gap-3">
        <span class="w-3 h-3 rounded-full shrink-0" style="background:${h.color}"></span>
        <div>
          <p class="text-sm font-medium">${h.name} <span class="text-gray-500 font-normal">(${h.ticker})</span></p>
          <p class="text-xs text-gray-500">${h.desc}</p>
        </div>
      </div>
      <div class="text-right">
        <p class="text-sm font-semibold">${h.value}</p>
        <p class="text-xs ${h.positive ? "text-emerald-400" : "text-red-400"}">${h.change} &nbsp;·&nbsp; ${h.pct}%</p>
      </div>
    </div>`).join("");

  $("portfolio-section").innerHTML = `
    <div class="flex items-center justify-between mb-6">
      <h2 class="text-base font-semibold">Investment Portfolio</h2>
      <span class="text-xs text-gray-500">Updated Mar 24, 2026</span>
    </div>
    <div class="flex flex-col md:flex-row items-center gap-10">
      <div class="relative shrink-0 w-48 h-48">
        ${renderDonutChart()}
        <div class="absolute inset-0 flex flex-col items-center justify-center">
          <p class="text-xl font-bold">$248k</p>
          <p class="text-xs text-gray-500">Total</p>
        </div>
      </div>
      <div class="flex-1 w-full space-y-4">${holdings}</div>
    </div>`;
}

function renderActivity() {
  const rows = activity.map(a => `
    <div class="flex items-center justify-between px-5 py-4">
      <div class="flex items-center gap-3">
        <div class="w-9 h-9 rounded-xl ${a.bg} flex items-center justify-center text-sm">${a.icon}</div>
        <div>
          <p class="text-sm font-medium">${a.label}</p>
          <p class="text-xs text-gray-500">${a.sub}</p>
        </div>
      </div>
      <span class="text-sm font-semibold ${a.positive ? "text-emerald-400" : "text-red-400"}">${a.amount}</span>
    </div>`).join("");

  $("activity-section").innerHTML = `
    <div class="flex items-center justify-between mb-4">
      <h2 class="text-base font-semibold">Recent Activity</h2>
      <a href="#" class="text-sm text-emerald-400 hover:underline">View all</a>
    </div>
    <div class="bg-gray-900 border border-gray-800 rounded-2xl divide-y divide-gray-800">${rows}</div>`;
}

function renderRightColumn() {
  const accountRows = accounts.map(a => `
    <div class="flex items-center justify-between">
      <div class="flex items-center gap-3">
        <div class="w-9 h-9 rounded-lg ${a.bg} flex items-center justify-center text-sm">${a.icon}</div>
        <div>
          <p class="text-sm font-medium">${a.name}</p>
          <p class="text-xs text-gray-500">${a.sub}</p>
        </div>
      </div>
      <span class="text-sm font-semibold">${a.value}</span>
    </div>`).join("");

  const perfGrid = performance.map(p => `
    <div>
      <p class="text-xs text-gray-500 mb-0.5">${p.label}</p>
      <p class="text-lg font-bold text-emerald-400">${p.value}</p>
    </div>`).join("");

  $("right-column").innerHTML = `
    <div class="bg-gray-900 border border-gray-800 rounded-2xl p-5">
      <h2 class="text-base font-semibold mb-4">Brokerage Accounts</h2>
      <div class="space-y-3">${accountRows}</div>
    </div>
    <div class="bg-gray-900 border border-gray-800 rounded-2xl p-5">
      <h2 class="text-base font-semibold mb-4">Performance</h2>
      <div class="grid grid-cols-2 gap-4">${perfGrid}</div>
    </div>`;
}

// ─── Init ──────────────────────────────────────────────────────────────────────
renderProfile();
renderSummary();
renderPortfolio();
renderActivity();
renderRightColumn();
</script>
</body>
</html>
